<!-- @dsCard group="Mobile app" viewport="430x760" name="RoutineFlow mobile" subtitle="Interactive iPhone app — Home, Calendar, Analytics, Settings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoutineFlow — Mobile</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="./data.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper-100); font-family: var(--font-text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .phone {
    position: relative; width: 390px; height: 800px; flex: none;
    background: var(--surface-app); border-radius: 46px;
    box-shadow: 0 0 0 11px #0c0d10, 0 0 0 13px #2a2c31, var(--shadow-pop);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 116px; height: 33px; background: #0c0d10; border-radius: 999px; z-index: 30; }
  .statusbar { height: 52px; flex: none; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 6px; font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .statusbar .icons { display: flex; align-items: center; gap: 6px; }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { width: 0; }
  .tabbar {
    flex: none; height: 78px; display: flex; align-items: flex-start; justify-content: space-around;
    padding: 10px 14px 0; background: rgba(250,249,246,0.92); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border-subtle); position: relative;
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; cursor: pointer; padding: 4px 14px; color: var(--text-faint); transition: color var(--duration-fast) var(--ease-standard); }
  .tab.active { color: var(--interactive); }
  .tab span { font-size: 10px; font-weight: 600; letter-spacing: 0.01em; }
  .fab { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 54px; height: 54px; border-radius: 999px; background: var(--interactive); color: #fff; border: 4px solid var(--surface-app); box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform var(--duration-fast) var(--ease-standard); }
  .fab:active { transform: translateX(-50%) scale(0.94); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="./home.jsx" type="text/babel" data-presets="react"></script>
  <script src="./calendar.jsx" type="text/babel" data-presets="react"></script>
  <script src="./analytics.jsx" type="text/babel" data-presets="react"></script>
  <script src="./settings.jsx" type="text/babel" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
    const TABS = [
      { id: 'home', label: 'Today', icon: 'home', Screen: () => window.HomeScreen() },
      { id: 'calendar', label: 'Calendar', icon: 'calendar', Screen: () => window.CalendarScreen() },
      { id: 'analytics', label: 'Analytics', icon: 'bar-chart-3', Screen: () => window.AnalyticsScreen() },
      { id: 'settings', label: 'Settings', icon: 'settings', Screen: () => window.SettingsScreen() },
    ];

    function Icon({ name, size = 22 }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current) { ref.current.innerHTML = `<i data-lucide="${name}"></i>`; window.lucide && window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': 2 }, root: ref.current }); }
      }, [name, size]);
      return <span ref={ref} style={{ display: 'inline-flex' }} />;
    }

    function App() {
      const [tab, setTab] = React.useState('home');
      const screenRef = React.useRef(null);
      React.useEffect(() => { if (screenRef.current) screenRef.current.scrollTop = 0; }, [tab]);
      const Current = TABS.find(t => t.id === tab).Screen;
      return (
        <div className="phone">
          <div className="island"></div>
          <div className="statusbar">
            <span>9:41</span>
            <span className="icons"><Icon name="signal" size={15} /><Icon name="wifi" size={15} /><Icon name="battery-full" size={17} /></span>
          </div>
          <div className="screen" ref={screenRef}>
            <Current />
          </div>
          <nav className="tabbar">
            {TABS.slice(0, 2).map(t => <TabBtn key={t.id} t={t} tab={tab} setTab={setTab} />)}
            <div style={{ width: 54 }} />
            {TABS.slice(2).map(t => <TabBtn key={t.id} t={t} tab={tab} setTab={setTab} />)}
            <button className="fab" aria-label="New routine"><Icon name="plus" size={26} /></button>
          </nav>
        </div>
      );
    }

    function TabBtn({ t, tab, setTab }) {
      return (
        <button className={'tab' + (tab === t.id ? ' active' : '')} onClick={() => setTab(t.id)}>
          <Icon name={t.icon} size={22} />
          <span>{t.label}</span>
        </button>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
