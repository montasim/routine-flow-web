  --ink-900:#16181d;--ink-800:#25272e;--ink-700:#3a3d45;--ink-500:#6a6e78;--ink-400:#8b8f99;--ink-300:#b4b8c0;
  --signal-50:#eef2ff;--signal-100:#dde4ff;--signal-200:#bccaff;--signal-300:#95acff;--signal-500:#3e63ff;--signal-600:#2f4fe0;--signal-700:#2540b8;
  --completed-600:#1f9d5b;--completed-500:#25b36b;--completed-100:#e4f4ec;
  --pending-600:#707682;--pending-500:#8b909b;--pending-100:#eeeeea;
  --missed-600:#d83a3f;--missed-500:#e5484d;--missed-100:#fbe7e8;
  --skipped-600:#cf8a26;--skipped-500:#e8a13a;--skipped-100:#fbf0dd;
  --ramp-0:#f1f0ea;--ramp-1:#cfe6da;--ramp-2:#93cdaf;--ramp-3:#4fb083;--ramp-4:#1f9d5b;
  --text-primary:var(--ink-900);--text-secondary:var(--ink-500);--text-muted:var(--ink-400);--text-faint:var(--ink-300);--text-inverse:#fff;
  --surface-app:var(--paper-50);--surface-card:var(--paper-0);--surface-sunken:var(--paper-100);--surface-inverse:var(--ink-900);
  --border-subtle:var(--paper-200);--border-default:var(--paper-300);--border-strong:var(--paper-400);
  --interactive:var(--signal-500);--interactive-hover:var(--signal-600);--interactive-active:var(--signal-700);--interactive-tint:var(--signal-50);
  --status-completed:var(--completed-600);--status-completed-bg:var(--completed-100);
  --status-pending:var(--pending-600);--status-pending-bg:var(--pending-100);
  --status-missed:var(--missed-600);--status-missed-bg:var(--missed-100);
  --status-skipped:var(--skipped-600);--status-skipped-bg:var(--skipped-100);
  --font-display:'Space Grotesk',system-ui,sans-serif;--font-text:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',monospace;
  --text-2xs:0.6875rem;--text-xs:0.75rem;--text-sm:0.8125rem;--text-md:0.9375rem;--text-lg:1.0625rem;--text-xl:1.375rem;--text-2xl:1.75rem;--text-3xl:2.25rem;--text-4xl:3rem;
  --weight-regular:400;--weight-medium:500;--weight-semibold:600;--weight-bold:700;
  --leading-tight:1.1;--leading-snug:1.28;--leading-normal:1.5;

*{box-sizing:border-box;}
html{overflow-x:hidden;}
body{margin:0;background:var(--surface-app);font-family:var(--font-text);color:var(--text-primary);overflow-x:hidden;}
.app{display:flex;height:100vh;max-width:100vw;overflow:hidden;}
.sidebar{width:236px;flex:none;background:var(--surface-card);border-right:1px solid var(--border-subtle);padding:22px 16px;display:flex;flex-direction:column;gap:4px;height:100vh;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px;}
.brand-name{font-family:var(--font-display);font-size:19px;font-weight:700;letter-spacing:-0.02em;}
.brand-flow{color:var(--interactive);}
.nav-btn{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-md);cursor:pointer;color:var(--text-secondary);font-size:var(--text-md);font-weight:500;border:none;background:none;width:100%;text-align:left;transition:background var(--duration-fast) var(--ease-standard);}
.nav-btn:hover{background:var(--surface-sunken);}
.nav-btn.active{background:var(--signal-50);color:var(--signal-700);font-weight:600;}
.nav-foot{margin-top:auto;}
.main-area{flex:1;min-width:0;max-width:100%;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border-subtle);background:var(--surface-app);position:sticky;top:0;z-index:10;}
.content{padding:28px 32px 48px;width:100%;max-width:1200px;}
.tzchip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:var(--radius-pill);background:var(--surface-sunken);font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
table{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
th{text-align:left;padding:12px 24px;font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border-subtle);}
td{padding:12px 24px;}
tr:not(:last-child) td{border-bottom:1px solid var(--border-subtle);}
tr:hover td{background:var(--surface-sunken);}

/* ── Tablet: hide sidebar, show top nav ── */
.mobile-topnav{display:none;}
.mobile-bottomnav{display:none;}
@media(max-width:1024px){
  .app{height:auto;min-height:100vh;overflow:visible;}
  .main-area{height:auto;overflow:visible;}
  .sidebar{display:none;}
  .topbar{padding:14px 20px;position:sticky;}
  .content{padding:20px 20px 80px;}
  .kpis{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .mobile-topnav{
    display:flex;align-items:center;gap:4px;
    background:var(--surface-card);border-bottom:1px solid var(--border-subtle);
    padding:0 12px;overflow-x:auto;scrollbar-width:none;
  }
  .mobile-topnav::-webkit-scrollbar{display:none;}
  .mobile-topnav-btn{
    display:flex;align-items:center;gap:7px;padding:10px 12px;
    border:none;background:none;cursor:pointer;white-space:nowrap;
    font-size:var(--text-sm);font-weight:500;font-family:var(--font-text);
    color:var(--text-secondary);border-bottom:2px solid transparent;
    transition:color var(--duration-fast) var(--ease-standard),border-color var(--duration-fast) var(--ease-standard);
  }
  .mobile-topnav-btn.active{color:var(--interactive);border-bottom-color:var(--interactive);font-weight:600;}
  .mobile-topnav-btn:hover:not(.active){color:var(--text-primary);background:var(--surface-sunken);}
}

/* ── Mobile: bottom nav bar ── */
@media(max-width:640px){
  .topbar{padding:12px 16px;}
  .content{padding:16px 16px 88px;}
  .kpis{grid-template-columns:1fr 1fr;gap:10px;}
  .two-col{grid-template-columns:1fr;gap:12px;}
  .mobile-topnav{display:none;}
  .tzchip{display:none;}
  .topbar-title{display:block !important;}
  /* Tables — force horizontal scroll on mobile */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .table-wrap table{min-width:520px;}
  /* Settings stacks to single column */
  .settings-grid{grid-template-columns:1fr !important;}
  /* Exports inline grid stacks */
  .exports-filters{grid-template-columns:1fr !important;}
  .exports-sheets{grid-template-columns:1fr !important;}
  /* Discipline score stacks */
  .discipline-inner{flex-direction:column !important;align-items:flex-start !important;}
  /* Topbar Export button — icon only on mobile */
  .export-btn-label{display:none;}
  /* Profile row in settings stacks */
  .profile-row{flex-wrap:wrap;}
  .mobile-bottomnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:rgba(250,249,246,0.95);backdrop-filter:blur(12px);
    border-top:1px solid var(--border-subtle);
    padding:8px 4px 16px;gap:0;z-index:50;
  }
  .mobile-bottomnav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    border:none;background:none;cursor:pointer;padding:4px 6px;
    color:var(--text-faint);transition:color var(--duration-fast) var(--ease-standard);
  }
  .mobile-bottomnav-btn.active{color:var(--interactive);}
  .mobile-bottomnav-btn span{font-size:10px;font-weight:600;letter-spacing:0.01em;}
  th{padding:10px 12px;font-size:0.625rem;}
  td{padding:10px 12px;}
}
@keyframes webToastIn{from{opacity:0;transform:translateY(10px) scale(0.96)}to{opacity:1;transform:none}}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:none}}
</style>

    </div>
  );
}

function OtpInput({value,onChange,onComplete}){
  const inputs=React.useRef([]);
  const digits=Array.from({length:6},(_,i)=>value[i]||'');
  function handleKey(i,e){
    if(e.key==='Backspace'&&!digits[i]&&i>0){inputs.current[i-1]?.focus();return;}
    if(e.key==='ArrowLeft'&&i>0){inputs.current[i-1]?.focus();return;}
    if(e.key==='ArrowRight'&&i<5){inputs.current[i+1]?.focus();}
  }
  function handleChange(i,e){
    const ch=e.target.value.replace(/\D/g,'').slice(-1);
    const next=digits.map((d,idx)=>idx===i?ch:d).join('');
    onChange(next);
    if(ch&&i<5)inputs.current[i+1]?.focus();
    if(next.length===6)onComplete&&onComplete(next);
  }
  function handlePaste(e){
    const pasted=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    onChange(pasted);
    if(pasted.length===6){onComplete&&onComplete(pasted);inputs.current[5]?.focus();}
    else inputs.current[Math.min(pasted.length,5)]?.focus();
    e.preventDefault();
  }
  return(
    <div style={{display:'flex',gap:8,justifyContent:'center'}}>
      {digits.map((d,i)=>(
        <input key={i} ref={el=>inputs.current[i]=el}
          type="text" inputMode="numeric" maxLength={1} value={d}
          onChange={e=>handleChange(i,e)} onKeyDown={e=>handleKey(i,e)} onPaste={handlePaste}
          style={{
            width:48,height:54,borderRadius:'var(--radius-md)',textAlign:'center',
            border:'1.5px solid '+(d?'var(--interactive)':'var(--border-default)'),
            fontSize:'var(--text-2xl)',fontFamily:'var(--font-mono)',fontWeight:600,
            color:'var(--text-primary)',background:'var(--surface-card)',
            outline:'none',transition:'border-color var(--duration-fast) var(--ease-standard)',
            caretColor:'var(--interactive)',
          }}
          onFocus={e=>e.target.style.borderColor='var(--interactive)'}
          onBlur={e=>e.target.style.borderColor=d?'var(--interactive)':'var(--border-default)'}
        />
      ))}
    </div>
  );
}

              </div>
              <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
                <Checkbox checked={agreed} onChange={setAgreed} ariaLabel="Accept terms"/>
                <span style={{fontSize:'var(--text-sm)',color:'var(--text-secondary)',lineHeight:1.5}}>
                  I understand that <strong>routine_logs</strong> is the single source of truth, and RoutineFlow stores only what I complete or skip.
                </span>
              </div>
              <Button variant="primary" fullWidth onClick={sendOtp} disabled={loading}>
                {loading?'Sending code…':'Continue with email'}
              </Button>
            </div>
            <div style={{marginTop:24,paddingTop:24,borderTop:'1px solid var(--border-subtle)',textAlign:'center',fontSize:'var(--text-sm)',color:'var(--text-secondary)'}}>
              Already have an account?{' '}
              <button onClick={onGoSignIn} style={{background:'none',border:'none',padding:0,cursor:'pointer',color:'var(--interactive)',fontWeight:600,fontFamily:'var(--font-text)',fontSize:'var(--text-sm)'}}>Sign in</button>
            </div>
          </>
        ):(
          <>
            <button onClick={()=>{setStep('entry');setOtp('');setError('');}} style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',padding:'0 0 20px',cursor:'pointer',color:'var(--text-secondary)',fontSize:'var(--text-sm)',fontFamily:'var(--font-text)'}}>
              <Icon name="arrow-left" size={16}/>Back
            </button>
            <div style={{marginBottom:28,textAlign:'center'}}>
              <div style={{width:48,height:48,borderRadius:'var(--radius-lg)',background:'var(--signal-50)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
                <Icon name="mail" size={22}/>
              </div>
              <h1 style={{fontFamily:'var(--font-display)',fontSize:'var(--text-2xl)',fontWeight:700,letterSpacing:'-0.02em',margin:'0 0 6px'}}>Verify your email</h1>
              <p style={{fontSize:'var(--text-sm)',color:'var(--text-secondary)',margin:0}}>
                Code sent to <strong>{email}</strong>
              </p>
            </div>
            {error&&<div style={{background:'var(--missed-100)',color:'var(--missed-600)',fontSize:'var(--text-sm)',padding:'10px 14px',borderRadius:'var(--radius-md)',marginBottom:16,fontWeight:500,textAlign:'center'}}>{error}</div>}
            <div style={{display:'flex',flexDirection:'column',gap:20}}>
              <OtpInput value={otp} onChange={setOtp} onComplete={verifyOtp}/>
              <Button variant="primary" fullWidth onClick={()=>verifyOtp()} disabled={loading||otp.length<6}>
                {loading?'Verifying…':'Create account'}
              </Button>
              <div style={{textAlign:'center',fontSize:'var(--text-sm)',color:'var(--text-secondary)'}}>
                Didn't receive it?{' '}
                {resendTimer>0
                  ?<span style={{color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>Resend in {resendTimer}s</span>
                  :<button onClick={()=>{setOtp('');setResendTimer(30);}} style={{background:'none',border:'none',padding:0,cursor:'pointer',color:'var(--interactive)',fontWeight:600,fontFamily:'var(--font-text)',fontSize:'var(--text-sm)'}}>Resend code</button>
                }
              </div>
            </div>
          </>
        )}
      </Card>
    </AuthLayout>
  );
}

function NewRoutineModal({onClose,onSave}){
  const toast=useWebToast();
  const [title,setTitle]=React.useState('');
  const [time,setTime]=React.useState('08:00');
  const [category,setCategory]=React.useState('Health');
  const [recurrence,setRecurrence]=React.useState('Daily');
  const [days,setDays]=React.useState([1,2,3,4,5]); // Mon–Fri default for weekly
  const [reminder,setReminder]=React.useState('15');
  const [useCustomReminder,setUseCustomReminder]=React.useState(false);
  const [error,setError]=React.useState('');
  const [saving,setSaving]=React.useState(false);

  const DAY_LABELS=['S','M','T','W','T','F','S'];
  function toggleDay(i){setDays(d=>d.includes(i)?d.filter(x=>x!==i):[...d,i].sort());}

  function handleSave(){
    if(!title.trim()){setError('Routine name is required.');return;}
    setSaving(true);setError('');
    setTimeout(()=>{setSaving(false);onSave({title,time,category,recurrence});toast(`"${title}" saved. First occurrence generates at 23:00.`,{tone:'completed',icon:'check'});},600);
  }

  // Close on backdrop click
  function onBackdrop(e){if(e.target===e.currentTarget)onClose();}

  return(
    <div onClick={onBackdrop} style={{
      position:'fixed',inset:0,zIndex:200,
      background:'rgba(22,24,29,0.4)',
      display:'flex',alignItems:'center',justifyContent:'center',
      padding:'16px',
    }}>
      <div style={{
        background:'var(--surface-card)',borderRadius:'var(--radius-xl)',
        width:'100%',maxWidth:520,maxHeight:'90vh',overflowY:'auto',
        boxShadow:'var(--shadow-pop)',
        animation:'modalIn 180ms var(--ease-out) both',
      }}>
        <style>{`@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:none}}`}</style>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'22px 24px 0'}}>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontSize:'var(--text-2xl)',fontWeight:700,letterSpacing:'-0.02em'}}>New routine</div>
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-secondary)',marginTop:3}}>Occurrences generate nightly via cron.</div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:'var(--radius-md)',border:'none',background:'var(--surface-sunken)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)'}}>
            <Icon name="x" size={16}/>
          </button>
        </div>

        {/* Body */}
        <div style={{padding:'20px 24px 24px',display:'flex',flexDirection:'column',gap:18}}>

          {error&&<div style={{background:'var(--missed-100)',color:'var(--missed-600)',fontSize:'var(--text-sm)',padding:'10px 14px',borderRadius:'var(--radius-md)',fontWeight:500}}>{error}</div>}

          {/* Title */}
          <div>
            <label style={{display:'block',fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--text-muted)',marginBottom:6}}>Routine name</label>
            <Input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Morning run" fullWidth autoFocus/>
          </div>

          {/* Time + Category row */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div>
              <label style={{display:'block',fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--text-muted)',marginBottom:6}}>Scheduled time</label>
              <Input type="time" value={time} onChange={e=>setTime(e.target.value)} fullWidth/>
            </div>
            <div>
              <label style={{display:'block',fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--text-muted)',marginBottom:6}}>Category</label>
              <Select fullWidth value={category} onChange={e=>setCategory(e.target.value)}
                options={['Health','Fitness','Work','Mind','Personal','Finance','Social']}/>
            </div>
          </div>

          {/* Recurrence */}
          <div>
            <label style={{display:'block',fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--text-muted)',marginBottom:6}}>Recurrence</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {['Daily','Weekly','Monthly','Custom'].map(r=>(
                <button key={r} onClick={()=>setRecurrence(r)} style={{
                  padding:'7px 16px',borderRadius:'var(--radius-pill)',border:'1.5px solid',
                  borderColor:recurrence===r?'var(--interactive)':'var(--border-default)',
                  background:recurrence===r?'var(--signal-50)':'transparent',
                  color:recurrence===r?'var(--interactive)':'var(--text-secondary)',
                  fontFamily:'var(--font-text)',fontSize:'var(--text-sm)',fontWeight:recurrence===r?600:400,
                  cursor:'pointer',transition:'all var(--duration-fast) var(--ease-standard)',
                }}>{r}</button>
              ))}
            </div>
          </div>

          {/* Day picker — only for Weekly */}
          {recurrence==='Weekly'&&(
            <div>
              <label style={{display:'block',fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--text-muted)',marginBottom:8}}>Days of week</label>
              <div style={{display:'flex',gap:6}}>
                {DAY_LABELS.map((d,i)=>(
                  <button key={i} onClick={()=>toggleDay(i)} style={{
                    width:36,height:36,borderRadius:'var(--radius-pill)',border:'1.5px solid',
                    borderColor:days.includes(i)?'var(--interactive)':'var(--border-default)',
                    background:days.includes(i)?'var(--interactive)':'transparent',
                    color:days.includes(i)?'#fff':'var(--text-secondary)',
                    fontFamily:'var(--font-mono)',fontSize:'var(--text-xs)',fontWeight:600,
                    cursor:'pointer',transition:'all var(--duration-fast) var(--ease-standard)',
                  }}>{d}</button>
                ))}
              </div>
            </div>
          )}

          {/* Reminder */}
          <div style={{padding:'16px',background:'var(--surface-sunken)',borderRadius:'var(--radius-lg)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:useCustomReminder?12:0}}>
              <div>
                <div style={{fontSize:'var(--text-sm)',fontWeight:500}}>Custom reminder offset</div>
                <div style={{fontSize:'var(--text-xs)',color:'var(--text-muted)',marginTop:2}}>Override the global reminder for this routine</div>
              </div>
              <Switch checked={useCustomReminder} onChange={setUseCustomReminder} ariaLabel="Custom reminder"/>
            </div>
            {useCustomReminder&&(
              <div>
                <label style={{display:'block',fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--text-muted)',marginBottom:6}}>Minutes before</label>
                <Select fullWidth value={reminder} onChange={e=>setReminder(e.target.value)}
                  options={[{value:'5',label:'5 min'},{value:'10',label:'10 min'},{value:'15',label:'15 min'},{value:'20',label:'20 min'},{value:'30',label:'30 min'},{value:'45',label:'45 min'},{value:'60',label:'60 min'}]}/>
              </div>
            )}
          </div>

          {/* Preview */}
          {title&&(
            <div style={{padding:'12px 14px',background:'var(--signal-50)',borderRadius:'var(--radius-md)',border:'1px solid var(--signal-100)'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--signal-600)',marginBottom:4}}>Preview</div>
              <div style={{fontSize:'var(--text-sm)',color:'var(--text-primary)'}}>
                <strong>{title}</strong> · {time} · {recurrence}
                {recurrence==='Weekly'&&days.length>0&&<span> ({days.map(d=>['Su','Mo','Tu','We','Th','Fr','Sa'][d]).join(', ')})</span>}
              </div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-xs)',color:'var(--text-secondary)',marginTop:3}}>
                First occurrence generates tonight at 23:00 {window.RF_DATA.user.timezone}.
              </div>
            </div>
          )}

          {/* Actions */}
          <div style={{display:'flex',gap:10,paddingTop:4}}>
            <Button variant="secondary" fullWidth onClick={onClose}>Cancel</Button>
            <Button variant="primary" fullWidth onClick={handleSave} disabled={saving}>
              {saving?'Saving…':'Save routine'}
            </Button>
          </div>
        </div>
      </div>
    </div>
  );
}

                      <div style={{width:(r.consistency*100)+'%',height:'100%',background:'var(--completed-600)',borderRadius:'var(--radius-pill)'}}/>
                    </div>
                    <span style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-xs)',color:'var(--text-secondary)'}}>{Math.round(r.consistency*100)}%</span>
                  </div>
                </td>
                <td>

                    <span style={{width:6,height:6,borderRadius:'50%',background:r.active?'var(--completed-600)':'var(--border-default)',display:'inline-block'}}/>

/* ─── CONFIRM MODAL ──────────────────────────────────────────────────────── */
function ConfirmModal({config,onConfirm,onCancel}){
  // config: { icon, iconTone, title, body, confirmLabel, confirmTone, cancelLabel }
  const tone=config.confirmTone||'danger'; // 'danger' | 'primary'
  const confirmStyle={
    danger:{bg:'var(--missed-600)',hover:'var(--missed-500)',fg:'#fff'},
    primary:{bg:'var(--interactive)',hover:'var(--interactive-hover)',fg:'#fff'},
  }[tone]||{bg:'var(--missed-600)',hover:'var(--missed-500)',fg:'#fff'};

  React.useEffect(()=>{
    function onKey(e){if(e.key==='Escape')onCancel();}
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[]);

  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onCancel();}} style={{
      position:'fixed',inset:0,zIndex:500,
      background:'rgba(22,24,29,0.45)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:16,
    }}>
      <div style={{
        background:'var(--surface-card)',borderRadius:'var(--radius-xl)',
        width:'100%',maxWidth:400,
        boxShadow:'var(--shadow-pop)',
        animation:'modalIn 180ms var(--ease-out) both',
        overflow:'hidden',
      }}>
        {/* Icon header band */}
        <div style={{padding:'28px 28px 0',display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',gap:14}}>
          <div style={{
            width:52,height:52,borderRadius:'var(--radius-lg)',
            background:tone==='danger'?'var(--missed-100)':'var(--signal-50)',
            display:'flex',alignItems:'center',justifyContent:'center',
          }}>
            <span style={{color:tone==='danger'?'var(--missed-600)':'var(--interactive)',display:'inline-flex'}}>
              <Icon name={config.icon||'alert-triangle'} size={24}/>
            </span>
          </div>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontSize:'var(--text-xl)',fontWeight:700,letterSpacing:'-0.02em',marginBottom:6}}>
              {config.title}
            </div>
            <div style={{fontSize:'var(--text-sm)',color:'var(--text-secondary)',lineHeight:1.55}}>
              {config.body}
            </div>
          </div>
        </div>
        {/* Actions */}
        <div style={{padding:'24px 28px 28px',display:'flex',gap:10}}>
          <button onClick={onCancel} style={{
            flex:1,padding:'10px 16px',borderRadius:'var(--radius-md)',
            border:'1.5px solid var(--border-default)',background:'var(--surface-card)',
            cursor:'pointer',fontFamily:'var(--font-text)',fontSize:'var(--text-md)',fontWeight:500,
            color:'var(--text-primary)',transition:'background var(--duration-fast) var(--ease-standard)',
          }}
          onMouseEnter={e=>e.currentTarget.style.background='var(--surface-sunken)'}
          onMouseLeave={e=>e.currentTarget.style.background='var(--surface-card)'}
          >{config.cancelLabel||'Cancel'}</button>
          <button onClick={onConfirm} style={{
            flex:1,padding:'10px 16px',borderRadius:'var(--radius-md)',
            border:'none',background:confirmStyle.bg,
            cursor:'pointer',fontFamily:'var(--font-text)',fontSize:'var(--text-md)',fontWeight:600,
            color:confirmStyle.fg,display:'flex',alignItems:'center',justifyContent:'center',gap:7,
            transition:'background var(--duration-fast) var(--ease-standard)',
          }}
          onMouseEnter={e=>e.currentTarget.style.background=confirmStyle.hover}
          onMouseLeave={e=>e.currentTarget.style.background=confirmStyle.bg}
          >
            <Icon name={config.icon||'alert-triangle'} size={15}/>
            {config.confirmLabel||'Confirm'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── PROFILE MENU ───────────────────────────────────────────────────────── */
function ProfileMenu({user,onGoSettings,onRequestSignOut}){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);

  // Close on outside click
  React.useEffect(()=>{
    if(!open)return;
    function handler(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[open]);

  function MenuItem({icon,label,onClick,danger}){
    const [hover,setHover]=React.useState(false);
    return(
      <button
        onMouseEnter={()=>setHover(true)}
        onMouseLeave={()=>setHover(false)}
        onClick={()=>{setOpen(false);onClick();}}
        style={{
          display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 14px',
          border:'none',borderRadius:'var(--radius-md)',cursor:'pointer',textAlign:'left',
          background:hover?(danger?'var(--missed-100)':'var(--surface-sunken)'):'transparent',
          color:danger?'var(--missed-600)':'var(--text-primary)',
          fontSize:'var(--text-sm)',fontFamily:'var(--font-text)',fontWeight:500,
          transition:'background var(--duration-fast) var(--ease-standard)',
        }}>
        <Icon name={icon} size={15}/>{label}
      </button>
    );
  }

  const initials=(user.name||'').trim().split(/\s+/).map(p=>p[0]||'').join('').slice(0,2).toUpperCase()||'?';

  return(
    <div ref={ref} style={{position:'relative'}}>
      <button
        onClick={()=>setOpen(v=>!v)}
        style={{
          width:36,height:36,borderRadius:'var(--radius-pill)',border:'none',cursor:'pointer',
          background:'var(--signal-500)',color:'#fff',
          fontFamily:'var(--font-display)',fontSize:13,fontWeight:700,letterSpacing:'0.01em',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:open?'0 0 0 3px var(--signal-100)':'none',
          transition:'box-shadow var(--duration-fast) var(--ease-standard)',
          flexShrink:0,
        }}
        aria-label="Open profile menu"
        aria-expanded={open}
      >{initials}</button>

      {open&&(
        <div style={{
          position:'absolute',top:'calc(100% + 8px)',right:0,zIndex:100,
          width:224,background:'var(--surface-card)',
          borderRadius:'var(--radius-lg)',border:'1px solid var(--border-subtle)',
          boxShadow:'var(--shadow-lg)',
          padding:'6px',
          animation:'dropIn 120ms var(--ease-out) both',
        }}>
          <style>{`@keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}`}</style>
          <div style={{padding:'10px 14px 12px',borderBottom:'1px solid var(--border-subtle)',marginBottom:4}}>
            <div style={{fontWeight:600,fontSize:'var(--text-sm)',color:'var(--text-primary)',marginBottom:1}}>{user.name}</div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>{user.email}</div>
          </div>
          <MenuItem icon="settings" label="Settings" onClick={onGoSettings}/>
          <div style={{height:1,background:'var(--border-subtle)',margin:'4px 0'}}/>
          <MenuItem icon="log-out" label="Sign out" onClick={onRequestSignOut} danger/>
        </div>
      )}
    </div>
  );
}

        onConfirm={()=>{setConfirmSignOutMenu(false);toast('Signing out…',{tone:'default',icon:'log-out',duration:1500});setTimeout(onSignOut,800);}}
        onCancel={()=>setConfirmSignOutMenu(false)}
      />
    )}
    </>
  );
}

/* ─── WEB TOAST / ACTION ALERT SYSTEM ──────────────────────────────────── */
const WebToastCtx=React.createContext(null);
function useWebToast(){return React.useContext(WebToastCtx);}

function WebToastProvider({children}){
  const [toasts,setToasts]=React.useState([]);
  const add=React.useCallback((msg,opts={})=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,tone:opts.tone||'default',icon:opts.icon||null,action:opts.action||null}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),opts.duration||4000);
  },[]);
  const dismiss=React.useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);
  return(
    <WebToastCtx.Provider value={add}>
      {children}
      <WebToastStack toasts={toasts} onDismiss={dismiss}/>
    </WebToastCtx.Provider>
  );
}

function WebToastStack({toasts,onDismiss}){
  if(!toasts.length)return null;
  const toneMap={
    default:{bg:'var(--ink-900)',border:'rgba(255,255,255,0.08)',fg:'#fff',icon_color:'rgba(255,255,255,0.6)'},
    completed:{bg:'var(--completed-600)',border:'rgba(255,255,255,0.15)',fg:'#fff',icon_color:'rgba(255,255,255,0.8)'},
    missed:{bg:'var(--missed-600)',border:'rgba(255,255,255,0.15)',fg:'#fff',icon_color:'rgba(255,255,255,0.8)'},
    skipped:{bg:'var(--skipped-600)',border:'rgba(255,255,255,0.15)',fg:'#fff',icon_color:'rgba(255,255,255,0.8)'},
    signal:{bg:'var(--interactive)',border:'rgba(255,255,255,0.15)',fg:'#fff',icon_color:'rgba(255,255,255,0.8)'},
    warning:{bg:'var(--skipped-100)',border:'var(--skipped-500)',fg:'var(--skipped-600)',icon_color:'var(--skipped-600)'},
  };
  return(
    <div style={{
      position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',
      zIndex:1000,display:'flex',flexDirection:'column',alignItems:'center',gap:8,
      pointerEvents:'none',width:'max-content',maxWidth:'calc(100vw - 32px)',
    }}>
      {toasts.map(t=>{
        const s=toneMap[t.tone]||toneMap.default;
        return(
          <div key={t.id} style={{
            background:s.bg,border:'1px solid '+s.border,color:s.fg,
            borderRadius:'var(--radius-xl)',padding:'12px 16px',
            fontSize:'var(--text-sm)',fontWeight:500,
            boxShadow:'var(--shadow-lg)',
            display:'flex',alignItems:'center',gap:10,
            minWidth:280,maxWidth:420,
            animation:'webToastIn 220ms var(--ease-out) both',
            pointerEvents:'auto',
          }}>
            {t.icon&&(
              <span style={{color:s.icon_color,display:'inline-flex',flexShrink:0}}>
                <Icon name={t.icon} size={16}/>
              </span>
            )}
            <span style={{flex:1}}>{t.msg}</span>
            {t.action&&(
              <button onClick={()=>{t.action.fn();onDismiss(t.id);}} style={{
                background:'rgba(255,255,255,0.18)',border:'none',borderRadius:'var(--radius-md)',
                padding:'4px 10px',cursor:'pointer',fontSize:'var(--text-xs)',fontWeight:600,
                color:s.fg,fontFamily:'var(--font-text)',flexShrink:0,
              }}>{t.action.label}</button>
            )}
            <button onClick={()=>onDismiss(t.id)} style={{
              background:'none',border:'none',cursor:'pointer',padding:2,
              color:s.icon_color,display:'inline-flex',flexShrink:0,
            }}><Icon name="x" size={14}/></button>
          </div>
        );
      })}
    </div>
  );
}

function App(){
  const [page,setPage]=React.useState('signin');
  return(
    <WebToastProvider>
      {page==='signin'&&<SignInPage onSignIn={()=>setPage('app')} onGoSignUp={()=>setPage('signup')}/>}
      {page==='signup'&&<SignUpPage onSignUp={()=>setPage('app')} onGoSignIn={()=>setPage('signin')}/>}
      {page==='app'&&<Dashboard onSignOut={()=>setPage('signin')}/>}
    </WebToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
