openapi: 3.1.0
info:
  title: RoutineFlow API
  version: 1.0.0
  description: Versioned V1 API for RoutineFlow web and first-party mobile clients.
servers:
  - url: /api/v1
security:
  - cookieSession: []
  - bearerSession: []
tags:
  - name: Auth
  - name: Settings
  - name: Categories
  - name: Routines
  - name: Occurrences
  - name: Logs
  - name: Analytics
  - name: Export
  - name: Sync
  - name: Cron
paths:
  /auth/otp/send:
    post:
      tags: [Auth]
      security: []
      summary: Send numeric email OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpSendRequest"
            examples:
              send:
                value: { email: user@example.com, name: Demo User, timezone: Asia/Dhaka }
      responses:
        "202":
          description: OTP accepted for delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSendResponse"
  /auth/otp/verify:
    post:
      tags: [Auth]
      security: []
      summary: Verify OTP and create web/bearer session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
            examples:
              verify:
                value: { email: user@example.com, code: "123456" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
              examples:
                success:
                  value:
                    data:
                      session: { token: session_token_for_api_clients, expiresAt: "2026-07-06T00:00:00.000Z" }
                      user: { id: user_id, name: Demo User, email: user@example.com, image: null }
                    meta: { requestId: req_123 }
        "401":
          $ref: "#/components/responses/Problem"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh current session
      responses:
        "200":
          description: Refreshed session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user and settings
      responses:
        "200":
          description: Current session user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
  /auth/social/google/start:
    get:
      tags: [Auth]
      security: []
      summary: Start RoutineFlow-managed Google OAuth
      parameters:
        - in: query
          name: client
          schema: { type: string, enum: [web, mobile] }
        - in: query
          name: redirectUri
          schema: { type: string }
        - in: query
          name: state
          schema: { type: string }
      responses:
        "307":
          description: Redirects to OAuth/callback flow
  /auth/social/google/callback:
    get:
      tags: [Auth]
      security: []
      summary: Handle Google OAuth callback
      responses:
        "307":
          description: Redirects to web app or mobile deep link with one-time exchange code
  /auth/social/exchange:
    post:
      tags: [Auth]
      security: []
      summary: Exchange mobile social auth code for bearer session
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialExchangeRequest"
            examples:
              exchange:
                value: { code: one_time_exchange_code, redirectUri: routineflow://auth/callback }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
  /auth/{all}:
    get:
      tags: [Auth]
      summary: Better Auth internal handler
      parameters:
        - in: path
          name: all
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Better Auth response
    post:
      tags: [Auth]
      summary: Better Auth internal handler
      parameters:
        - in: path
          name: all
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Better Auth response
  /settings:
    get:
      tags: [Settings]
      summary: Get user settings
      responses:
        "200":
          description: Current user settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
    patch:
      tags: [Settings]
      summary: Update timezone, reminders, notifications, or retention
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsPatchRequest"
            examples:
              timezone:
                value: { timezone: Asia/Dhaka }
      responses:
        "200":
          description: Settings updated and pending occurrences/notifications adjusted
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      parameters:
        - $ref: "#/components/parameters/IncludeDeleted"
        - $ref: "#/components/parameters/UpdatedSince"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"
    post:
      tags: [Categories]
      summary: Create category
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryWrite"
            examples:
              create:
                value: { name: Fitness, color: "#1F9D5B", description: Training and movement routines, sortOrder: 10 }
      responses:
        "201":
          description: Category created
  /categories/{id}:
    patch:
      tags: [Categories]
      summary: Update category
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryWrite"
      responses:
        "200":
          description: Category updated
    delete:
      tags: [Categories]
      summary: Soft-delete category
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Category deleted with tombstone
  /routines:
    get:
      tags: [Routines]
      summary: List routines
      parameters:
        - in: query
          name: includeInactive
          schema: { type: boolean }
        - in: query
          name: includeDeleted
          schema: { type: boolean }
        - in: query
          name: categoryId
          schema: { type: string }
        - $ref: "#/components/parameters/UpdatedSince"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Routine list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutinesResponse"
    post:
      tags: [Routines]
      summary: Create routine and generate matching 7-day occurrences
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutineWrite"
            examples:
              create:
                value:
                  title: Morning Gym
                  categoryId: category_fitness_id
                  scheduledTime: "07:00"
                  recurrenceType: weekly
                  recurrenceRules: { daysOfWeek: [1, 3, 5] }
                  reminderOverride: null
      responses:
        "201":
          description: Routine created
  /routines/{id}:
    patch:
      tags: [Routines]
      summary: Update routine and regenerate pending occurrences when scheduling changes
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutinePatch"
      responses:
        "200":
          description: Routine updated
    delete:
      tags: [Routines]
      summary: Soft-delete routine and remove pending future occurrences
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Routine deleted with tombstone
  /occurrences:
    get:
      tags: [Occurrences]
      summary: List generated occurrences
      parameters:
        - in: query
          name: date
          schema: { type: string, format: date }
        - in: query
          name: startDate
          schema: { type: string, format: date }
        - in: query
          name: endDate
          schema: { type: string, format: date }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/OccurrenceStatus" }
        - $ref: "#/components/parameters/UpdatedSince"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Occurrence list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OccurrencesResponse"
  /occurrences/generate:
    post:
      tags: [Occurrences]
      summary: Ensure rolling 7-day window and mark older pending missed
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Generation result
  /occurrences/{id}/complete:
    post:
      tags: [Occurrences]
      summary: Complete same-day pending occurrence and write routine_log
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Occurrence completed and log created
  /occurrences/{id}/skip:
    post:
      tags: [Occurrences]
      summary: Skip same-day pending occurrence and write routine_log
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Occurrence skipped and log created
  /logs:
    get:
      tags: [Logs]
      summary: List finalized routine_logs
      parameters:
        - in: query
          name: startDate
          schema: { type: string, format: date }
        - in: query
          name: endDate
          schema: { type: string, format: date }
        - in: query
          name: routineId
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/LogStatus" }
        - $ref: "#/components/parameters/UpdatedSince"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Log list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsResponse"
  /analytics:
    get:
      tags: [Analytics]
      summary: Read analytics derived only from routine_logs
      parameters:
        - in: query
          name: period
          required: true
          schema: { type: string, enum: [daily, weekly, monthly, yearly] }
        - in: query
          name: date
          schema: { type: string, format: date }
        - in: query
          name: startDate
          schema: { type: string, format: date }
        - in: query
          name: endDate
          schema: { type: string, format: date }
        - in: query
          name: routineId
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        "200":
          description: Analytics metrics and series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
  /export:
    get:
      tags: [Export]
      summary: Download XLSX or CSV export
      parameters:
        - in: query
          name: format
          schema: { type: string, enum: [xlsx, csv], default: xlsx }
        - in: query
          name: range
          schema: { type: string, enum: [all, 7d, 30d, 90d, custom], default: 30d }
        - in: query
          name: startDate
          schema: { type: string, format: date }
        - in: query
          name: endDate
          schema: { type: string, format: date }
        - in: query
          name: routineId
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        "200":
          description: Binary export file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
            text/csv:
              schema: { type: string, format: binary }
  /exports:
    get:
      tags: [Export]
      summary: List generated export records for the current user
      responses:
        "200":
          description: Export record list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportsResponse"
  /sync/tombstones:
    get:
      tags: [Sync]
      summary: List tombstones for mobile cache deletion sync
      parameters:
        - in: query
          name: resourceType
          schema: { type: string, enum: [routine, occurrence, category] }
        - $ref: "#/components/parameters/UpdatedSince"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Tombstone list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TombstonesResponse"
  /cron:
    post:
      tags: [Cron]
      security:
        - scheduledJobSecret: []
      summary: Server-to-server scheduled occurrence and missed-detection job
      responses:
        "200":
          description: Scheduled job result
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: routineflow_session
    bearerSession:
      type: http
      scheme: bearer
    scheduledJobSecret:
      type: http
      scheme: bearer
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 20 }
    ResourceId:
      in: path
      name: id
      required: true
      schema: { type: string }
    IncludeDeleted:
      in: query
      name: includeDeleted
      schema: { type: boolean }
    UpdatedSince:
      in: query
      name: updatedSince
      schema: { type: string, format: date-time }
    Cursor:
      in: query
      name: cursor
      schema: { type: string }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200 }
  responses:
    Problem:
      description: Problem Details error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    Envelope:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          type: object
          required: [requestId, apiVersion, serverTime]
          properties:
            requestId: { type: string }
            apiVersion: { type: string, enum: [v1] }
            serverTime: { type: string, format: date-time }
            nextCursor: { type: string }
            total: { type: integer }
    Problem:
      type: object
      required: [type, title, status, detail, instance, code, requestId]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { type: string }
        requestId: { type: string }
        errors:
          type: array
          items:
            type: object
            required: [path, message]
            properties:
              path: { type: string }
              message: { type: string }
    OtpSendRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        name: { type: string, maxLength: 120 }
        timezone: { type: string, example: Asia/Dhaka }
    OtpSendResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [message, resendAfterSeconds]
              properties:
                message: { type: string }
                resendAfterSeconds: { type: integer, example: 60 }
    OtpVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string, pattern: "^\\d{6}$" }
    SocialExchangeRequest:
      type: object
      required: [code, redirectUri]
      properties:
        code: { type: string }
        redirectUri: { type: string }
    AuthSessionResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [session, user]
              properties:
                session:
                  type: object
                  required: [token, expiresAt]
                  properties:
                    token: { type: string }
                    expiresAt: { type: string, format: date-time }
                user:
                  $ref: "#/components/schemas/User"
    LogoutResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                revoked: { type: boolean }
    AuthMeResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                user: { $ref: "#/components/schemas/User" }
                settings: { $ref: "#/components/schemas/UserSettings" }
    SettingsResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                settings: { $ref: "#/components/schemas/UserSettings" }
    SettingsPatchRequest:
      type: object
      properties:
        timezone: { type: string }
        defaultReminderMinutes: { type: integer, minimum: 0, maximum: 1440 }
        notificationPreferences:
          type: object
          properties:
            browserNotificationsEnabled: { type: boolean }
            overnightNotificationsDisabled: { type: boolean }
        dataRetentionMonths:
          anyOf:
            - { type: integer, minimum: 1, maximum: 120 }
            - { type: "null" }
    User:
      type: object
      required: [id, name, email, image]
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        image: { anyOf: [{ type: string }, { type: "null" }] }
    UserSettings:
      type: object
      properties:
        timezone: { type: string }
        defaultReminderMinutes: { type: integer }
        notificationPreferences:
          type: object
          properties:
            browserNotificationsEnabled: { type: boolean }
            overnightNotificationsDisabled: { type: boolean }
        dataRetentionMonths:
          anyOf:
            - { type: integer }
            - { type: "null" }
    CategoryWrite:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
        description:
          anyOf:
            - { type: string, maxLength: 240 }
            - { type: "null" }
        sortOrder: { type: integer }
    CategoriesResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                categories:
                  type: array
                  items: { $ref: "#/components/schemas/Category" }
    Category:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        name: { type: string }
        color: { type: string }
        description: { anyOf: [{ type: string }, { type: "null" }] }
        sortOrder: { type: integer }
        isDeleted: { type: boolean }
        deletedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
    RoutineWrite:
      type: object
      required: [title, categoryId, scheduledTime, recurrenceType, recurrenceRules, reminderOverride]
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        categoryId: { type: string }
        scheduledTime: { type: string, pattern: "^([01]\\d|2[0-3]):[0-5]\\d$" }
        recurrenceType: { $ref: "#/components/schemas/RecurrenceType" }
        recurrenceRules: { type: object }
        reminderOverride:
          anyOf:
            - { type: integer, minimum: 0, maximum: 1440 }
            - { type: "null" }
    RoutinePatch:
      allOf:
        - $ref: "#/components/schemas/RoutineWrite"
      description: Partial routine update; all fields optional.
    RoutinesResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                routines:
                  type: array
                  items: { $ref: "#/components/schemas/Routine" }
    Routine:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        categoryId: { type: string }
        scheduledTime: { type: string }
        scheduleType: { type: string, enum: [fixed, dynamic] }
        recurrenceType: { $ref: "#/components/schemas/RecurrenceType" }
        recurrenceRules: { type: object }
        reminderOverride:
          anyOf:
            - { type: integer }
            - { type: "null" }
        isActive: { type: boolean }
        isDeleted: { type: boolean }
    RecurrenceType:
      type: string
      enum: [daily, weekly, monthly, yearly]
    OccurrenceStatus:
      type: string
      enum: [Pending, Completed, Missed, Skipped]
    LogStatus:
      type: string
      enum: [Completed, Missed, Skipped]
    OccurrencesResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                occurrences:
                  type: array
                  items: { $ref: "#/components/schemas/Occurrence" }
    Occurrence:
      type: object
      properties:
        id: { type: string }
        routineId: { type: string }
        userId: { type: string }
        date: { type: string, format: date }
        scheduledTime: { type: string }
        scheduledTimeUtc: { type: string, format: date-time }
        timezoneAtGeneration: { type: string }
        status: { $ref: "#/components/schemas/OccurrenceStatus" }
        reminderMinutes: { type: integer }
        notificationDueAt: { type: string, format: date-time }
    LogsResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                logs:
                  type: array
                  items: { $ref: "#/components/schemas/RoutineLog" }
    RoutineLog:
      type: object
      description: Finalized historical source of truth with routine/category/timezone snapshots.
      properties:
        id: { type: string }
        routineId: { type: string }
        occurrenceId: { type: string }
        userId: { type: string }
        routineTitleAtLog: { type: string }
        routineCategoryIdAtLog: { type: string }
        routineCategoryNameAtLog: { type: string }
        routineCategoryColorAtLog: { type: string }
        scheduleTypeAtLog: { type: string, enum: [fixed, dynamic] }
        recurrenceTypeAtLog: { $ref: "#/components/schemas/RecurrenceType" }
        recurrenceRulesAtLog: { type: object }
        reminderMinutesAtLog: { type: integer }
        date: { type: string, format: date }
        scheduledTime: { type: string }
        scheduledTimeUtc: { type: string, format: date-time }
        completedAt: { anyOf: [{ type: string, format: date-time }, { type: "null" }] }
        timezoneAtLog: { type: string }
        status: { $ref: "#/components/schemas/LogStatus" }
        delayMinutes: { anyOf: [{ type: integer }, { type: "null" }] }
    AnalyticsResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                period: { type: string }
                metrics: { type: object }
                series:
                  type: array
                  items: { type: object }
                generatedAt: { type: string, format: date-time }
    ExportsResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                exports:
                  type: array
                  items: { $ref: "#/components/schemas/ExportRecord" }
    ExportRecord:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        createdAt: { type: string, format: date-time }
        label: { type: string }
        rows: { type: integer }
        file: { type: string }
    TombstonesResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                tombstones:
                  type: array
                  items:
