<!-- @dsCard group="Colors" viewport="700x170" name="Signal accent" subtitle="The one brand accent — cobalt-azure for everything interactive" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: var(--space-7); }
  .row { display: flex; gap: var(--space-4); }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); box-shadow: var(--ring-hairline); }
  .name { font-family: var(--font-mono); font-size: var(--text-2xs); margin-top: var(--space-3); color: var(--text-secondary); }
  .lead { font-size: var(--text-sm); color: var(--text-secondary); margin: 0 0 var(--space-5); }
  .lead b { color: var(--interactive); font-weight: var(--weight-semibold); }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lead">Used only for <b>interactive</b> intent: primary buttons, links, focus rings, active states.</p>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--signal-50)"></div><div class="name">signal-50</div></div>
      <div class="sw"><div class="chip" style="background:var(--signal-100)"></div><div class="name">signal-100</div></div>
      <div class="sw"><div class="chip" style="background:var(--signal-300)"></div><div class="name">signal-300</div></div>
      <div class="sw"><div class="chip" style="background:var(--signal-500)"></div><div class="name">signal-500</div></div>
      <div class="sw"><div class="chip" style="background:var(--signal-600)"></div><div class="name">signal-600</div></div>
      <div class="sw"><div class="chip" style="background:var(--signal-700)"></div><div class="name">signal-700</div></div>
    </div>
  </div>
</body>
</html>
