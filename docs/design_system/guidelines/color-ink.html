<!-- @dsCard group="Colors" viewport="700x150" name="Ink & text" subtitle="Warm-black ink scale for type and the wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); color: var(--text-primary); }
  .row { display: flex; gap: var(--space-4); padding: var(--space-7); }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); box-shadow: var(--ring-hairline); }
  .name { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: var(--tracking-mono); margin-top: var(--space-3); color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="name">ink-900</div><div class="hex">#16181D</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="name">ink-700</div><div class="hex">#3A3D45</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="name">ink-500</div><div class="hex">#6A6E78</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="name">ink-400</div><div class="hex">#8B8F99</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="name">ink-300</div><div class="hex">#B4B8C0</div></div>
  </div>
</body>
</html>
