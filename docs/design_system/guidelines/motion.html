<!-- @dsCard group="Spacing" viewport="700x170" name="Motion" subtitle="Calm and precise — quick fades, short slides, a subtle press-shrink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: var(--space-7) var(--space-8); display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6) var(--space-10); }
  .k { font-size: var(--text-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-caps); }
  .v { font-size: var(--text-sm); margin-top: var(--space-2); }
  .track { margin-top: var(--space-3); height: 6px; background: var(--surface-sunken); border-radius: var(--radius-pill); overflow: hidden; }
  .fill { height: 100%; width: 40%; background: var(--interactive); border-radius: var(--radius-pill); animation: slide 2.2s var(--ease-standard) infinite; }
  @keyframes slide { 0%{transform:translateX(-100%)} 60%,100%{transform:translateX(250%)} }
</style>
</head>
<body>
  <div class="wrap">
    <div><div class="k">Durations</div><div class="v">fast 140 · base 220 · slow 320</div></div>
    <div><div class="k">Standard easing</div><div class="v">cubic-bezier(.2, 0, 0, 1)</div></div>
    <div><div class="k">Press scale</div><div class="v">0.97 — shrink, never grow</div></div>
    <div><div class="k">In motion</div><div class="track"><div class="fill"></div></div></div>
  </div>
</body>
</html>
