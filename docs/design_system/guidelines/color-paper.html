<!-- @dsCard group="Colors" viewport="700x150" name="Paper neutrals" subtitle="Warm surfaces, tracks, and hairline borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); color: var(--text-primary); }
  .row { display: flex; gap: var(--space-4); padding: var(--space-7); }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); box-shadow: var(--ring-hairline); }
  .name { font-family: var(--font-mono); font-size: var(--text-2xs); margin-top: var(--space-3); color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="name">paper-0</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><div class="name">paper-50</div><div class="hex">#FAF9F6</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><div class="name">paper-100</div><div class="hex">#F1F0EA</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-200)"></div><div class="name">paper-200</div><div class="hex">#E6E4DB</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-300)"></div><div class="name">paper-300</div><div class="hex">#D4D1C5</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-400)"></div><div class="name">paper-400</div><div class="hex">#B6B2A4</div></div>
  </div>
</body>
</html>
