<!-- @dsCard group="Type" viewport="700x200" name="Display — Space Grotesk" subtitle="Headings, screen titles, and big metric numerics" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: var(--space-7) var(--space-8); }
  .eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--space-4); }
  .big { font-size: var(--text-4xl); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); margin: 0; }
  .mid { font-size: var(--text-xl); font-weight: var(--weight-semibold); letter-spacing: var(--tracking-tight); margin: var(--space-4) 0 0; color: var(--text-secondary); }
  .num { color: var(--interactive); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Space Grotesk · 400 / 500 / 600 / 700</div>
    <h1 class="big">Discipline, <span class="num">measured.</span></h1>
    <p class="mid">Every routine generates a log. Every log tells the truth.</p>
  </div>
</body>
</html>
