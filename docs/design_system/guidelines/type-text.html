<!-- @dsCard group="Type" viewport="700x200" name="Text — IBM Plex Sans" subtitle="UI labels and body copy across both clients" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: var(--space-7) var(--space-8); }
  .eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--space-4); }
  .lg { font-size: var(--text-lg); font-weight: var(--weight-semibold); margin: 0 0 var(--space-3); }
  .body { font-size: var(--text-md); line-height: var(--leading-relaxed); color: var(--text-secondary); margin: 0; max-width: 52ch; }
  .body b { color: var(--text-primary); font-weight: var(--weight-semibold); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">IBM Plex Sans · 400 / 500 / 600 / 700</div>
    <p class="lg">You define routines once.</p>
    <p class="body">The server generates daily occurrences, schedules your reminders, and quietly records what actually happened. You only ever <b>complete</b> or <b>skip</b> — the analytics build themselves.</p>
  </div>
</body>
</html>
