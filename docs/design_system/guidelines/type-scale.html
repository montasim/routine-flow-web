<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="From micro mono labels to hero numerics" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: var(--space-6) var(--space-8); }
  .line { display: flex; align-items: baseline; gap: var(--space-5); padding: var(--space-2) 0; }
  .tok { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); width: 76px; flex: none; }
  .spec { font-weight: var(--weight-semibold); letter-spacing: var(--tracking-tight); line-height: 1.1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">5xl / 64</span><span class="spec" style="font-size:var(--text-5xl)">86</span></div>
    <div class="line"><span class="tok">3xl / 36</span><span class="spec" style="font-size:var(--text-3xl)">Today</span></div>
    <div class="line"><span class="tok">2xl / 28</span><span class="spec" style="font-size:var(--text-2xl)">Weekly trend</span></div>
    <div class="line"><span class="tok">xl / 22</span><span class="spec" style="font-size:var(--text-xl)">Morning Gym</span></div>
    <div class="line"><span class="tok">md / 15</span><span class="spec" style="font-size:var(--text-md);font-family:var(--font-text);font-weight:var(--weight-regular)">Base UI &amp; body text</span></div>
    <div class="line"><span class="tok">xs / 12</span><span class="spec" style="font-size:var(--text-xs);font-family:var(--font-mono);font-weight:var(--weight-regular);color:var(--text-muted)">SCHEDULED · LOCAL</span></div>
  </div>
</body>
</html>
