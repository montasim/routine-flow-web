<!-- @dsCard group="Web app" viewport="1280x800" name="RoutineFlow dashboard" subtitle="Secondary web app — analytics overview + routine_logs table" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoutineFlow — Dashboard</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../mobile/data.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface-app); font-family: var(--font-text); color: var(--text-primary); }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 236px; flex: none; background: var(--surface-card); border-right: 1px solid var(--border-subtle); padding: 22px 16px; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 22px; }
  .brand img { width: 30px; height: 30px; }
  .brand .name { font-family: var(--font-display); font-size: 19px; font-weight: 700; letter-spacing: -0.02em; }
  .brand .name .flow { color: var(--interactive); }
  .nav { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); font-size: var(--text-md); font-weight: 500; border: none; background: none; width: 100%; text-align: left; transition: background var(--duration-fast) var(--ease-standard); }
  .nav:hover { background: var(--surface-sunken); }
  .nav.active { background: var(--signal-50); color: var(--signal-700); font-weight: 600; }
  .nav-foot { margin-top: auto; }
  .main { flex: 1; min-width: 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border-subtle); background: rgba(250,249,246,0.85); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
  .content { padding: 28px 32px 48px; max-width: 1200px; }
  .tzchip { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: var(--radius-pill); background: var(--surface-sunken); font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-secondary); }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .two { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 20px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="./dashboard.jsx" type="text/babel" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
    const { MetricTile, Tabs, Avatar, Button } = window.RoutineFlowDesignSystem_4781a2;

    function Icon({ name, size = 18 }) {
      const ref = React.useRef(null);
      React.useEffect(() => { if (ref.current) { ref.current.innerHTML = `<i data-lucide="${name}"></i>`; window.lucide && window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': 2 }, root: ref.current }); } }, [name, size]);
      return <span ref={ref} style={{ display: 'inline-flex' }} />;
    }

    const NAV = [
      { id: 'overview', label: 'Overview', icon: 'layout-dashboard' },
      { id: 'routines', label: 'Routines', icon: 'repeat' },
      { id: 'logs', label: 'Logs', icon: 'list' },
      { id: 'exports', label: 'Exports', icon: 'download' },
    ];

    function App() {
      const D = window.RF_DATA;
      const [nav, setNav] = React.useState('overview');
      const [period, setPeriod] = React.useState('week');
      return (
        <div className="app">
          <aside className="sidebar">
            <div className="brand">
              <img src="../../assets/mark.svg" alt="" />
              <span className="name">Routine<span className="flow">Flow</span></span>
            </div>
            {NAV.map(n => (
              <button key={n.id} className={'nav' + (nav === n.id ? ' active' : '')} onClick={() => setNav(n.id)}>
                <Icon name={n.icon} size={18} />{n.label}
              </button>
            ))}
            <div className="nav-foot">
              <button className={'nav' + (nav === 'settings' ? ' active' : '')} onClick={() => setNav('settings')}><Icon name="settings" size={18} />Settings</button>
            </div>
          </aside>

          <main className="main">
            <div className="topbar">
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-2xs)', textTransform: 'uppercase', letterSpacing: 'var(--tracking-caps)', color: 'var(--text-muted)' }}>Analytics</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 'var(--text-2xl)', fontWeight: 700, letterSpacing: '-0.02em' }}>Overview</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <span className="tzchip"><Icon name="globe" size={14} />Asia/Dhaka</span>
                <Button variant="primary" iconLeft={<Icon name="download" size={16} />}>Export .xlsx</Button>
                <Avatar name={D.user.name} size={36} />
              </div>
            </div>

            <div className="content">
              <div style={{ marginBottom: 22 }}>
                <Tabs value={period} onChange={setPeriod} items={[
                  { value: 'day', label: 'Daily' }, { value: 'week', label: 'Weekly' },
                  { value: 'month', label: 'Monthly' }, { value: 'year', label: 'Yearly' },
                ]} />
              </div>

              <div className="kpis">
                <MetricTile label="Completion rate" value="82" unit="%" delta="+4%" deltaDirection="up" />
                <MetricTile label="Missed" value="4" tone="missed" delta="2" deltaDirection="down" />
                <MetricTile label="Avg delay" value="7" unit="min" delta="2m" deltaDirection="down" tone="completed" />
                <MetricTile label="Streak stability" value="86" unit="%" delta="+6%" deltaDirection="up" tone="signal" />
              </div>

              <div className="two">
                {window.RFTrendChart({ data: D.weekTrend })}
                {window.RFDisciplinePanel({ m: D.metrics.yearly })}
              </div>

              {window.RFLogsTable()}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
