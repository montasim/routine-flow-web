*{box-sizing:border-box;}
body{margin:0;background:var(--paper-100);font-family:var(--font-text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.phone{position:relative;width:390px;height:800px;flex:none;background:var(--surface-app);border-radius:46px;box-shadow:0 0 0 11px #0c0d10,0 0 0 13px #2a2c31,var(--shadow-pop);overflow:hidden;display:flex;flex-direction:column;}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:116px;height:33px;background:#0c0d10;border-radius:999px;z-index:30;}
.statusbar{height:52px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 6px;font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-primary);}
.statusbar .icons{display:flex;align-items:center;gap:6px;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{width:0;}
.tabbar{flex:none;height:78px;display:flex;align-items:flex-start;justify-content:space-around;padding:10px 14px 0;background:rgba(250,249,246,0.92);backdrop-filter:blur(12px);border-top:1px solid var(--border-subtle);position:relative;}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 14px;color:var(--text-faint);transition:color var(--duration-fast) var(--ease-standard);}
.tab.active{color:var(--interactive);}
.tab span{font-size:10px;font-weight:600;letter-spacing:0.01em;}
.fab{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:54px;height:54px;border-radius:999px;background:var(--interactive);color:#fff;border:4px solid var(--surface-app);box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform var(--duration-fast) var(--ease-standard);}
.fab:active{transform:translateX(-50%) scale(0.94);}
@keyframes notifDrop{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(0.95)}to{opacity:1;transform:none}}

function MobileOtpInput({value,onChange,onComplete}){
  const inputs=React.useRef([]);
  const digits=Array.from({length:6},(_,i)=>value[i]||'');
  function handleKey(i,e){
    if(e.key==='Backspace'&&!digits[i]&&i>0){inputs.current[i-1]?.focus();return;}
  }
  function handleChange(i,e){
    const ch=e.target.value.replace(/\D/g,'').slice(-1);
    const next=digits.map((d,idx)=>idx===i?ch:d).join('');
    onChange(next);
    if(ch&&i<5)inputs.current[i+1]?.focus();
    if(next.length===6)onComplete&&onComplete(next);
  }
  function handlePaste(e){
    const pasted=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    onChange(pasted);
    if(pasted.length===6){onComplete&&onComplete(pasted);inputs.current[5]?.focus();}
    e.preventDefault();
  }
  return(
    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
      {digits.map((d,i)=>(
        <input key={i} ref={el=>inputs.current[i]=el}
          type="text" inputMode="numeric" maxLength={1} value={d}
          onChange={e=>handleChange(i,e)} onKeyDown={e=>handleKey(i,e)} onPaste={handlePaste}
          style={{
            width:42,height:50,borderRadius:'var(--radius-md)',textAlign:'center',
            border:'1.5px solid '+(d?'var(--interactive)':'var(--border-default)'),
            fontSize:'var(--text-xl)',fontFamily:'var(--font-mono)',fontWeight:600,
            color:'var(--text-primary)',background:'var(--surface-card)',outline:'none',
          }}
          onFocus={e=>e.target.style.borderColor='var(--interactive)'}
          onBlur={e=>e.target.style.borderColor=d?'var(--interactive)':'var(--border-default)'}
        />
      ))}
    </div>
  );
}

function CalendarScreen(){
  const month=window.RF_DATA.month;
  const [sel,setSel]=React.useState(21);
  const DOW=['M','T','W','T','F','S','S'];
  const offset=3;
  function dayColor(d){
    if(d.status==='future')return{bg:'transparent',fg:'var(--text-faint)',ring:'1px solid var(--border-subtle)'};
    if(d.status==='today')return{bg:'var(--ink-900)',fg:'#fff',ring:'none'};
    if(d.status==='missed')return{bg:'var(--missed-100)',fg:'var(--missed-600)',ring:'none'};
    if(d.status==='perfect')return{bg:'var(--ramp-4)',fg:'#fff',ring:'none'};
    const lvl=d.rate<0.4?'var(--ramp-1)':d.rate<0.7?'var(--ramp-2)':'var(--ramp-3)';
    return{bg:lvl,fg:'var(--ink-900)',ring:'none'};
  }
  const selLog=[
    {time:'06:30',title:'Wake & hydrate',category:'Health',status:'Completed',delay:-2},
    {time:'07:00',title:'Morning Gym',category:'Fitness',status:'Completed',delay:4},
    {time:'09:30',title:'Deep work block',category:'Work',status:'Missed',delay:null},
    {time:'22:30',title:'Read 20 minutes',category:'Mind',status:'Skipped',delay:null},
  ];
  return(
    <div style={{padding:'0 20px 24px'}}>
      <header style={{padding:'8px 0 18px'}}>

      <Card padding="md" style={{marginBottom:18}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6,marginBottom:8}}>
          {DOW.map((d,i)=><div key={i} style={{textAlign:'center',fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',color:'var(--text-faint)'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}}>
          {Array.from({length:offset}).map((_,i)=><div key={'b'+i}/>)}
          {month.map(d=>{
            const c=dayColor(d);const isSel=d.day===sel;
            return(
              <button key={d.day} onClick={()=>setSel(d.day)} style={{
                aspectRatio:'1',border:c.ring,background:c.bg,color:c.fg,borderRadius:'var(--radius-sm)',cursor:'pointer',
                fontFamily:'var(--font-mono)',fontSize:'var(--text-sm)',fontWeight:500,
                outline:isSel?'2px solid var(--interactive)':'none',outlineOffset:1,
                display:'flex',alignItems:'center',justifyContent:'center',

      <div style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-2xs)',textTransform:'uppercase',letterSpacing:'var(--tracking-caps)',color:'var(--text-muted)',margin:'0 0 10px 2px'}}>{sel} June · log</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {selLog.map((l,i)=>(
          <Card key={i} padding="sm" style={{display:'flex',alignItems:'center',gap:14}}>
            <span style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-md)',color:'var(--text-primary)',width:48}}>{l.time}</span>

}

/* ─── MOBILE ACTION SHEET (confirmation) ────────────────────────────────── */
function MobileActionSheet({config, onConfirm, onCancel}){
  const isDanger = config.confirmTone === 'danger';

  React.useEffect(()=>{
    function onKey(e){if(e.key==='Escape')onCancel();}
    document.addEventListener('keydown', onKey);
    return()=>document.removeEventListener('keydown', onKey);
  },[]);

  return(
    <div
      onClick={e=>{if(e.target===e.currentTarget)onCancel();}}
      style={{
        position:'absolute',inset:0,zIndex:200,
        background:'rgba(22,24,29,0.45)',
        display:'flex',alignItems:'flex-end',
      }}
    >
      <div style={{
        width:'100%',
        animation:'sheetUp 260ms var(--ease-out) both',
        padding:'0 12px 20px',
      }}>
        <style>{`@keyframes sheetUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}`}</style>

        {/* Title + body + confirm action */}
        <div style={{
          background:'rgba(250,249,246,0.97)',backdropFilter:'blur(20px)',
          borderRadius:'var(--radius-xl)',
          overflow:'hidden',
          marginBottom:8,
        }}>
          {(config.title||config.body)&&(
            <div style={{
              padding:'16px 16px 12px',
              borderBottom:'1px solid var(--border-subtle)',
              textAlign:'center',
            }}>
              {config.title&&<div style={{fontFamily:'var(--font-display)',fontSize:'var(--text-md)',fontWeight:700,color:'var(--text-primary)',marginBottom:config.body?4:0}}>{config.title}</div>}
              {config.body&&<div style={{fontSize:'var(--text-xs)',color:'var(--text-secondary)',lineHeight:1.55}}>{config.body}</div>}
            </div>
          )}
          <button
            onClick={onConfirm}
            style={{
              width:'100%',padding:'16px',border:'none',background:'transparent',
              cursor:'pointer',fontFamily:'var(--font-text)',fontSize:'var(--text-md)',fontWeight:600,
              color:isDanger?'var(--missed-600)':'var(--interactive)',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            }}
          >
            {config.icon&&<Icon name={config.icon} size={18}/>}
            {config.confirmLabel||'Confirm'}
          </button>
        </div>

        {/* Separate cancel card — iOS convention */}
        <div style={{
          background:'rgba(250,249,246,0.97)',backdropFilter:'blur(20px)',
          borderRadius:'var(--radius-xl)',overflow:'hidden',
        }}>
          <button
            onClick={onCancel}
            style={{
              width:'100%',padding:'16px',border:'none',background:'transparent',
              cursor:'pointer',fontFamily:'var(--font-text)',fontSize:'var(--text-md)',fontWeight:600,
              color:'var(--interactive)',
            }}
          >
            {config.cancelLabel||'Cancel'}
          </button>
        </div>
      </div>
    </div>
  );
}

          <div style={{marginTop:6,display:'flex',gap:10}}>
            <Button variant="secondary" fullWidth onClick={onClose}>Cancel</Button>
            <Button variant="primary" fullWidth onClick={onClose}>Save routine</Button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── APP SHELL ─────────────────────────────────────────────────────────── */
const TABS=[
  {id:'home',label:'Today',icon:'home'},
  {id:'calendar',label:'Calendar',icon:'calendar'},
  {id:'routines',label:'Routines',icon:'repeat'},
  {id:'analytics',label:'Analytics',icon:'bar-chart-3'},
  {id:'settings',label:'Settings',icon:'settings'},
];

/* ─── TOAST SYSTEM ──────────────────────────────────────────────────────── */
// Shared context
const ToastCtx=React.createContext(null);
function useToast(){return React.useContext(ToastCtx);}

function ToastProvider({children}){
  const [toasts,setToasts]=React.useState([]);
  const add=React.useCallback((msg,opts={})=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,tone:opts.tone||'default',icon:opts.icon||null}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),opts.duration||3000);
  },[]);
  return(
    <ToastCtx.Provider value={add}>
      {children}
      <ToastStack toasts={toasts}/>
    </ToastCtx.Provider>
  );
}

function ToastStack({toasts}){
  if(!toasts.length)return null;
  const toneStyles={
    default:{bg:'var(--ink-800)',fg:'#fff'},
    completed:{bg:'var(--completed-600)',fg:'#fff'},
    skipped:{bg:'var(--skipped-600)',fg:'#fff'},
    missed:{bg:'var(--missed-600)',fg:'#fff'},
  };
  return(
    <div style={{position:'absolute',bottom:90,left:0,right:0,display:'flex',flexDirection:'column',alignItems:'center',gap:8,zIndex:100,pointerEvents:'none',padding:'0 16px'}}>
      {toasts.map(t=>{
        const s=toneStyles[t.tone]||toneStyles.default;
        return(
          <div key={t.id} style={{
            background:s.bg,color:s.fg,
            borderRadius:'var(--radius-xl)',padding:'12px 18px',
            fontSize:'var(--text-sm)',fontWeight:500,
            boxShadow:'var(--shadow-lg)',
            display:'flex',alignItems:'center',gap:8,
            maxWidth:320,
            animation:'toastIn 200ms var(--ease-out) both',
            pointerEvents:'auto',
          }}>
            {t.icon&&<Icon name={t.icon} size={16}/>}
            {t.msg}
          </div>
        );
      })}
    </div>
  );
}

/* ─── iOS PUSH NOTIFICATION BANNER ──────────────────────────────────────── */
function PushNotification({notif,onDismiss}){
  React.useEffect(()=>{
    const t=setTimeout(onDismiss,5000);
    return()=>clearTimeout(t);
  },[]);
  return(
    <div style={{
      position:'absolute',top:56,left:8,right:8,zIndex:200,
      background:'rgba(30,32,38,0.90)',backdropFilter:'blur(20px)',
      borderRadius:'var(--radius-xl)',
      boxShadow:'var(--shadow-lg)',
      padding:'12px 14px',
      display:'flex',alignItems:'flex-start',gap:12,
      animation:'notifDrop 300ms var(--ease-out) both',
      cursor:'pointer',
    }} onClick={onDismiss}>
      <div style={{width:36,height:36,borderRadius:10,background:'var(--interactive)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="20" height="20" viewBox="0 0 96 96" fill="none"><rect width="96" height="96" rx="22" fill="#16181D"/><rect x="22" y="58" width="9" height="16" rx="3" fill="#6A6E78"/><rect x="35" y="48" width="9" height="26" rx="3" fill="#8B909B"/><rect x="48" y="36" width="9" height="38" rx="3" fill="#25B36B"/><rect x="61" y="24" width="9" height="50" rx="3" fill="#3E63FF"/><circle cx="65.5" cy="20" r="6" fill="#3E63FF"/></svg>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:2}}>
          <span style={{fontFamily:'var(--font-text)',fontSize:12,fontWeight:700,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.04em'}}>RoutineFlow</span>
          <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'rgba(255,255,255,0.4)'}}>{notif.time||'now'}</span>
        </div>
        <div style={{fontFamily:'var(--font-text)',fontSize:'var(--text-sm)',fontWeight:600,color:'#fff',marginBottom:2}}>{notif.title}</div>
        <div style={{fontFamily:'var(--font-text)',fontSize:'var(--text-xs)',color:'rgba(255,255,255,0.65)',lineHeight:1.4}}>{notif.body}</div>
      </div>
    </div>
  );
}

function MobileApp({onSignOut}){
  const [tab,setTab]=React.useState('home');
  const [showAdd,setShowAdd]=React.useState(false);
  const [pushNotif,setPushNotif]=React.useState(null);
  const [actionSheet,setActionSheet]=React.useState(null); // {config, onConfirm}
  const screenRef=React.useRef(null);
  React.useEffect(()=>{if(screenRef.current)screenRef.current.scrollTop=0;},[tab]);

  // Demo: show a push notification 2s after mount
  React.useEffect(()=>{
    const t=setTimeout(()=>{
      setPushNotif({
        title:'Morning Gym in 15 min',
        body:'Scheduled for 07:00. Tap to complete or skip.',
        time:'6:45 AM',
      });
    },2000);
    return()=>clearTimeout(t);
  },[]);

  function showSheet(config, onConfirm){
    setActionSheet({config, onConfirm});
  }
  function dismissSheet(){setActionSheet(null);}

  return(
    <ToastProvider>
      <div className="screen" ref={screenRef} style={{position:'relative'}}>
        {pushNotif&&<PushNotification notif={pushNotif} onDismiss={()=>setPushNotif(null)}/>}
        {tab==='home'&&<HomeScreen/>}
        {tab==='calendar'&&<CalendarScreen/>}
        {tab==='routines'&&<RoutinesScreen onAddNew={()=>setShowAdd(true)}/>}
        {tab==='analytics'&&<AnalyticsScreen/>}
        {tab==='settings'&&<SettingsScreen onShowSheet={showSheet} onSignOut={onSignOut}/>}
        {showAdd&&<AddRoutineSheet onClose={()=>setShowAdd(false)}/>}
      </div>
      <nav className="tabbar">
        {TABS.slice(0,2).map(t=>(
          <button key={t.id} className={'tab'+(tab===t.id?' active':'')} onClick={()=>setTab(t.id)}>
            <Icon name={t.icon} size={22}/><span>{t.label}</span>
          </button>
        ))}
        <div style={{width:54}}/>
        <button className={'tab'+(tab==='analytics'?' active':'')} onClick={()=>setTab('analytics')}>
          <Icon name="bar-chart-3" size={22}/><span>Analytics</span>
        </button>
        <button className={'tab'+(tab==='settings'?' active':'')} onClick={()=>setTab('settings')}>
          <Icon name="settings" size={22}/><span>Settings</span>
        </button>
        <button className="fab" aria-label="New routine" onClick={()=>setShowAdd(true)}><Icon name="plus" size={26}/></button>
      </nav>
      {/* Action sheet renders here — overlays screen + tabbar at phone level */}
      {actionSheet&&(
        <MobileActionSheet
          config={actionSheet.config}
          onConfirm={()=>{dismissSheet();actionSheet.onConfirm();}}
          onCancel={dismissSheet}
        />
      )}
    </ToastProvider>
  );
}

function App(){
  const [page,setPage]=React.useState('signin');

  return(
    <div className="phone">
      <div className="island"/>
      <div className="statusbar">
        <span>9:41</span>
        <span className="icons"><Icon name="signal" size={15}/><Icon name="wifi" size={15}/><Icon name="battery-full" size={17}/></span>
      </div>
      {page==='signin'&&(
        <div className="screen">
          <SignInScreen onSignIn={()=>setPage('app')} onGoSignUp={()=>setPage('signup')}/>
        </div>
      )}
      {page==='signup'&&(
        <div className="screen">
          <SignUpScreen onSignUp={()=>setPage('app')} onGoSignIn={()=>setPage('signin')}/>
        </div>
      )}
      {page==='app'&&<MobileApp onSignOut={()=>setPage('signin')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
</body>
